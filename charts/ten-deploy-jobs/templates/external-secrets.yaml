{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "ten-deploy-jobs.fullname" . }}-deployer-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ten-deploy-jobs.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "ten-deploy-jobs.fullname" . }}-deployer-secrets
    creationPolicy: Owner
  data:
    {{- if .Values.externalSecrets.l1DeployerKeyVaultKey }}
    - secretKey: L1_DEPLOYER_PRIVATE_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.l1DeployerKeyVaultKey }}
    {{- end }}
    {{- if .Values.externalSecrets.l2DeployerKeyVaultKey }}
    - secretKey: L2_DEPLOYER_PRIVATE_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.l2DeployerKeyVaultKey }}
    {{- end }}
{{- end }}
